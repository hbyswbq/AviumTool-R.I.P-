name: AviumTool CI (Fixed)
于:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix signing error (remove keystore and disable auto-sign)
      run: |
        # 删除有问题的密钥库
        rm -f keystore.jks
        
        # 自动修改build.gradle.kts，移除签名配置
        sed -i '/signingConfigs {/,/}/d' app/build.gradle.kts
        sed -i 's/signingConfig signingConfigs.release//g' app/build.gradle.kts
        
        # 添加阿里云镜像加速
        cat > settings.gradle.kts <<EOF
pluginManagement {
    仓库 {
        maven("https://maven.aliyun.com/repository/google")
        maven("https://maven.aliyun.com/repository/gradle-plugin")
        maven("https://maven.aliyun.com/repository/public")
        google()
        mavenCentral()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        maven("https://maven.aliyun.com/repository/google")
        maven("https://maven.aliyun.com/repository/public")
        google()
        mavenCentral()
    }
}
rootProject.name = "AviumTool"
include(":app")
EOF

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AviumTool-Debug-Fixed
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
