name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 提取提交短ID
        run: |
          GITHUB_SHA=${{ github.sha }}
          GITHUB_CI_COMMIT_ID=${GITHUB_SHA:0:7}
          echo "GITHUB_CI_COMMIT_ID=$GITHUB_CI_COMMIT_ID" >> $GITHUB_ENV

      - name: 安装Java 17环境
        uses: actions/setup-java@v4
        with:
          java-version: '17' # 降级到17，Android Gradle插件官方推荐，兼容性最好
          distribution: 'temurin'
          cache: 'gradle' # 内置Gradle缓存，无需额外配置

      - name: 替换为AOSP完整android.jar（解决系统API编译问题）
        run: |
          curl -L -O https://github.com/Reginer/aosp-android-jar/raw/refs/heads/main/android-35/android.jar
          mv android.jar /usr/local/lib/android/sdk/platforms/android-35/android.jar

      - name: 赋予gradlew执行权限
        run: chmod +x gradlew

      # ==================== Debug 构建（无签名，自动使用系统默认） ====================
      - name: 编译 AviumTool Debug版本
        run: ./gradlew clean assembleDebug
        # 关键：不注入任何签名环境变量，build.gradle会自动使用默认debug签名

      - name: 上传 AviumTool Debug版本
        uses: actions/upload-artifact@v4.6.2
        with:
          name: AviumTool-debug-${{ env.GITHUB_CI_COMMIT_ID }}
          path: "app/build/outputs/apk/debug/*.apk"
          retention-days: 30
        continue-on-error: true

      # ==================== Release 构建（仅当配置了签名密钥时运行） ====================
      - name: 准备签名文件（仅当存在SIGNING_KEY时执行）
        if: ${{ secrets.SIGNING_KEY != '' }}
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks

      - name: 编译 AviumTool Release版本（仅当存在签名文件时执行）
        if: ${{ secrets.SIGNING_KEY != '' }}
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: "../keystore.jks"
          KEYSTORE_PASS: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 上传 AviumTool Release版本
        uses: actions/upload-artifact@v4.6.2
        if: ${{ secrets.SIGNING_KEY != '' }}
        with:
          name: AviumTool-release-${{ env.GITHUB_CI_COMMIT_ID }}
          path: "app/build/outputs/apk/release/*.apk"
          retention-days: 90
        continue-on-error: true
