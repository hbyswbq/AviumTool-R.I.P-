version: 2
updates:
  - package-ecosystem: github-actions
    target-branch: dev
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - '*'
  - package-ecosystem: gradle
    target-branch: dev
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: cargo
    target-branch: dev
    directory: /core-utils/src/main/rust/logger/
    schedule:
      interval: weekly
